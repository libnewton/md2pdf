name: Mirror to Codeberg

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror main to Codeberg pages branch
        uses: yesolutions/mirror-action@v0.7.0
        with:
          REMOTE: "https://codeberg.org/md2pdf/pages.git"
          GIT_USERNAME: ${{ secrets.CODEBERG_USERNAME }}
          GIT_PASSWORD: ${{ secrets.CODEBERG_TOKEN }}
          PUSH_ALL_REFS: "false"
          GIT_REF: "HEAD:refs/heads/pages"
          GIT_PUSH_ARGS: "--force"
